name: Actualizar datos

# Cada día laborable tras el cierre de EE.UU. (22:10 UTC) y a mano desde "Actions".
on:
  schedule:
    - cron: "10 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: actualizar-datos
  cancel-in-progress: false

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 1) Comprobaciones de Python: sintaxis + tests del descargador (sin red real).
      - name: Comprobar sintaxis de Python
        run: python -m py_compile fetch_datos.py
      - name: Tests de datos (pytest)
        run: pip install pytest && pytest -q

      # 2) Descargar datos NUEVOS a datos.json. El propio script hace:
      #    temp -> validar esquema -> comparar con el anterior -> reemplazo atómico.
      #    Si algo es anómalo, sale != 0, el job falla y se CONSERVA el datos.json anterior.
      # OJO: sin pipefail, el código de salida del pipe sería el de `tee` y un fallo
      # del descargador pasaría desapercibido (se haría commit de datos malos).
      - name: Descargar y validar datos (atómico + comparación con anterior)
        shell: bash
        run: |
          set -o pipefail
          python fetch_datos.py | tee validacion.log

      # 3) Guardar el informe de validación (aunque falle) para poder revisarlo.
      - name: Guardar informe de validación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: informe-validacion
          path: validacion.log
          retention-days: 14

      # 4) Commit y push SOLO si datos.json cambió.
      - name: Commit y push si cambió
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git diff --staged --quiet || git commit -m "Datos actualizados $(date -u +%Y-%m-%d)"
          git push

